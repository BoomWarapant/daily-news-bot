name: Send LINE on news update
on:
  push:
    paths:
      - 'news/**'
  workflow_dispatch:

jobs:
  send-line:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Find today's news file
        id: find_news
        run: |
          TODAY=$(TZ='Asia/Bangkok' date +%Y-%m-%d)
          FILEPATH="news/${TODAY}.md"
          echo "Looking for: $FILEPATH"
          if [ ! -f "$FILEPATH" ]; then
            echo "::error::No news file for today ($TODAY). Bot did not commit. Aborting LINE send."
            exit 1
          fi
          echo "filepath=$FILEPATH" >> $GITHUB_OUTPUT
          echo "filename=$TODAY" >> $GITHUB_OUTPUT
      
      - name: Send LINE Push Message
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          FILEPATH: ${{ steps.find_news.outputs.filepath }}
          FILENAME: ${{ steps.find_news.outputs.filename }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request
          
          filepath = os.environ['FILEPATH']
          filename = os.environ['FILENAME']
          token = os.environ['LINE_TOKEN']
          user_id = os.environ['LINE_USER_ID']
          repo = os.environ['REPO']
          
          content = open(filepath, encoding='utf-8').read()
          if len(content) > 4200:
              content = content[:4200] + "\n...(ตัด)"
          
          repo_url = f"https://github.com/{repo}/blob/main/{filepath}"
          message = f"📰 ข่าวประจำวัน {filename}\n━━━━━━━━━━━━━\n{content}\n\n🔗 ดูเต็ม: {repo_url}"
          
          payload = {
              "to": user_id,
              "messages": [{"type": "text", "text": message}]
          }
          
          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=json.dumps(payload).encode('utf-8'),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json"
              },
              method="POST"
          )
          
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print(f"✅ LINE sent: HTTP {r.status}")
                  print(r.read().decode())
          except urllib.error.HTTPError as e:
              print(f"❌ LINE failed: HTTP {e.code}")
              print(e.read().decode())
              exit(1)
          EOF
