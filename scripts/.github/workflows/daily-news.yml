name: Daily News Bot

on:
  schedule:
    # 06:00 เวลาไทย = 23:00 UTC ของวันก่อนหน้า
    - cron: '0 23 * * *'
  workflow_dispatch:  # ให้กดรันเองใน UI ได้

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch news + send LINE
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python scripts/fetch_news.py
      
      - name: Commit news file to repo
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add news/
          git diff --cached --quiet || git commit -m "📰 News $(date -u +%Y-%m-%d)"
          git push
